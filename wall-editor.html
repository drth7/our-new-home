<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wall Editor — prototype</title>
<style>
:root{--bg:#12161d;--panel:rgba(26,33,44,.88);--panel2:#242e3c;--line:rgba(255,255,255,.08);--text:#e9eef5;--muted:#8b97a5;--accent:#4c86d6;--accent2:#6aa4f2;--danger:#e0555f;--gold:#ffd23e}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
/* top-middle bar: save / back / undo / 3d preview */
#top{position:fixed;left:50%;transform:translateX(-50%);top:10px;z-index:10;display:flex;gap:5px;align-items:center;padding:7px;background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 34px rgba(0,0,0,.45);max-width:96vw;justify-content:center}
.tb{border:1px solid transparent;border-radius:11px;background:transparent;color:var(--text);padding:8px 11px;font-size:12.5px;font-weight:650;cursor:pointer;display:flex;gap:6px;align-items:center;transition:background .15s,border-color .15s,transform .1s}
.tb:hover{background:var(--panel2)}
.tb:active{transform:scale(.96)}
.tb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 3px 12px rgba(76,134,214,.35)}
.sep{width:1px;height:20px;background:var(--line);margin:0 3px}
/* left rail: three floating panels (Tools · Add · File), each a stack of icon buttons */
#leftRail{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:9;display:flex;flex-direction:column;gap:8px;max-height:96vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
#leftRail::-webkit-scrollbar{display:none}
.prail{background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:16px;padding:7px;box-shadow:0 12px 36px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:3px}
.ph{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);text-align:center;font-weight:700;padding:1px 0 3px}
.ib{width:60px;border:1px solid transparent;border-radius:12px;background:transparent;color:var(--text);padding:7px 3px;font-size:10.5px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .15s,transform .1s;font-family:inherit}
.ib .ic{width:21px;height:21px;display:block}
.tb .ic{width:17px;height:17px;flex:none}
.ib:hover{background:var(--panel2)}
.ib:active{transform:scale(.93)}
.ib.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 3px 12px rgba(76,134,214,.35)}
.ib.danger.on{background:linear-gradient(135deg,#d84b56,#f07680);box-shadow:0 3px 12px rgba(224,85,95,.35)}
#cv{position:fixed;inset:0;top:0;cursor:crosshair;touch-action:none}
#insp{position:fixed;right:12px;bottom:12px;z-index:9;width:240px;background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 12px 36px rgba(0,0,0,.45);display:none}
#insp h3{font-size:12px;margin-bottom:2px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
#insp .big{font-size:22px;font-weight:750;margin:2px 0 6px;color:var(--gold)}
#insp label{display:block;font-size:11.5px;color:var(--muted);margin:9px 0 4px}
#insp input,#insp select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:7px 9px;font-size:13.5px;outline:none}
#insp input:focus{border-color:var(--accent)}
#insp .tip{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:10px}
#insp .row{display:flex;gap:6px}
#insp button{margin-top:11px;width:100%;border:none;border-radius:10px;padding:9px;background:rgba(224,85,95,.16);color:#f0949c;font-weight:700;cursor:pointer;transition:background .15s}
#insp button:hover{background:rgba(224,85,95,.32);color:#fff}
#rooms{position:fixed;right:12px;top:62px;z-index:9;background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:16px;padding:11px 13px;width:262px;max-height:56vh;overflow:auto;font-size:12.5px;box-shadow:0 12px 36px rgba(0,0,0,.45);display:none}
#rooms.open{display:block}                          /* shown only when the top-bar Rooms button is on */
body.ro #leftRail,body.ro #undoB,body.ro #saveB,body.ro #insp{display:none!important}   /* guest view-only: leaves 3D · Back · Rooms */
#rooms h3{font-size:12px;margin-bottom:7px}
#rooms .sub{color:var(--muted);font-weight:400;font-size:11px}
.rr{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:9px}
.rr:hover{background:var(--panel2)}
.rr .rn{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rr .ra{color:var(--muted);font-size:11px;flex:none}
.ric{border:none;background:transparent;color:var(--muted);cursor:pointer;padding:4px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center}
.ric svg{width:15px;height:15px;display:block}
.ric:hover{background:rgba(255,255,255,.09);color:var(--text)}
.rr.off{opacity:.5}
.rnedit{flex:1;background:var(--panel2);border:1px solid var(--accent);border-radius:7px;color:var(--text);padding:3px 7px;font-size:12.5px;outline:none;min-width:0}
#hint{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:8;background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:11px;padding:7px 14px;font-size:12px;color:var(--muted);white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
#p3d{position:fixed;inset:0;z-index:20;background:#0d1117;display:none}
#p3d canvas{position:absolute;inset:0}
#close3d{position:absolute;top:12px;right:12px;z-index:21}
#file{display:none}
@media (max-width:720px){
  #top{top:0;left:50%;transform:translateX(-50%);border-radius:0 0 16px 16px;padding:7px 9px}
  .tb{padding:8px 9px;font-size:12px}
  #leftRail{top:56px;transform:none;gap:6px;max-height:calc(100vh - 66px)}
  .prail{padding:5px}
  .ib{width:50px;font-size:9.5px;padding:5px 2px}
  .ib .ic{width:18px;height:18px}
  .ph{font-size:8px}
  #insp{left:8px;right:8px;width:auto;top:auto;bottom:8px;max-height:42vh;overflow:auto}
  #rooms{top:54px;right:8px;left:auto;width:min(74vw,252px);max-height:52vh}
  #rooms h3 .sub{display:none}                        /* the wordy subtitle wraps ugly on a narrow panel */
  .rr .ra{font-size:10.5px}
  body.insp-open #rooms{display:none}
  #hint{display:none}
}
</style>
</head>
<body>
<!-- top-middle: save · back · undo · 3D preview -->
<div id="top">
  <button class="tb" id="saveB" data-ic="save" title="Save to home" style="display:none;background:linear-gradient(135deg,#3fa26a,#5fc98b);color:#fff">Save</button>
  <button class="tb" id="exitB" data-ic="back" title="Back to home">Back</button>
  <span class="sep"></span>
  <button class="tb" id="undoB" data-ic="undo" title="Undo (Ctrl+Z)">Undo</button>
  <button class="tb" id="view3d" data-ic="cube" title="3D preview">3D</button>
  <button class="tb" id="roomsBtn" data-ic="map" title="Show rooms">Rooms</button>
</div>
<!-- left rail: Tools · Add · File -->
<div id="leftRail">
  <div class="prail">
    <div class="ph">Tools</div>
    <button class="ib on" data-tool="select" data-ic="cursor" title="Select & move">Select</button>
    <button class="ib" data-tool="zone" data-ic="split" title="Split a room (no wall)">Split</button>
    <button class="ib danger" data-tool="del" data-ic="trash" title="Delete">Delete</button>
  </div>
  <div class="prail">
    <div class="ph">Add</div>
    <button class="ib" data-tool="wall" data-ic="wall" title="Draw a wall">Wall</button>
    <button class="ib" data-tool="door" data-ic="door" title="Add a door">Door</button>
    <button class="ib" data-tool="win" data-ic="window" title="Add a window">Window</button>
    <button class="ib" data-tool="arch" data-ic="arch" title="Cut an archway">Arch</button>
    <button class="ib" data-tool="light" data-ic="bulb" title="Place a ceiling light">Light</button>
  </div>
  <div class="prail">
    <div class="ph">File</div>
    <button class="ib" id="resetB" data-ic="reset" title="Reset to apartment">Reset</button>
    <button class="ib" id="exportB" data-ic="download" title="Export plan (.json)">Export</button>
    <button class="ib" id="importB" data-ic="upload" title="Import plan (.json)">Import</button>
  </div>
</div>
<canvas id="cv"></canvas>
<div id="insp"></div>
<div id="rooms"></div>
<div id="hint">Drag empty space to pan · wheel to zoom · pick a tool on the left</div>
<div id="p3d"><button class="tb on" id="close3d">Back to editor</button></div>
<input type="file" id="file" accept=".json">
<script type="module">
/* ============ the current apartment (same PLAN format as the app) ============ */
const APARTMENT = {
  walls: [
    {d:'h', pos:-0.1, from:3.6, to:10.0, ops:[{t:'win', at:5.95, w:2.2}]},
    {d:'h', pos:1.2,  from:-0.2, to:0.35},
    {d:'h', pos:1.2,  from:0.35, to:3.15, ops:[{t:'glasswall'}]},
    {d:'h', pos:1.2,  from:3.15, to:3.6},
    {d:'v', pos:0.25, from:0.0,  to:1.2, rail:true},
    {d:'h', pos:0.0,  from:0.25, to:3.25, rail:true},
    {d:'v', pos:3.25, from:0.0,  to:1.2, rail:true},
    {d:'v', pos:10.0, from:-0.1, to:0.5},
    {d:'h', pos:-0.1, from:10.0, to:13.7},
    {d:'v', pos:13.6, from:-0.1, to:8.45, ops:[{t:'win', at:1.95, w:1.6},{t:'win', at:5.85, w:1.6}]},
    {d:'h', pos:7.7,  from:9.9,  to:13.7},
    {d:'h', pos:9.0,  from:1.2,  to:3.6,  ops:[{t:'door', at:2.4, w:0.9}]},
    {d:'h', pos:8.35, from:13.6, to:14.8},
    {d:'v', pos:-0.1, from:-0.2, to:13.4, ops:[{t:'win', at:6.7, w:0.6},{t:'door', at:12.7, w:1.0}]},
    {d:'h', pos:13.3, from:-0.2, to:3.5},
    {d:'h', pos:12.1, from:3.5,  to:13.7},
    {d:'v', pos:13.6, from:8.45, to:11.45, ops:[{t:'glasswall'}]},
    {d:'v', pos:13.6, from:11.45, to:12.1},
    {d:'v', pos:14.7, from:8.35, to:11.55, rail:true},
    {d:'h', pos:11.55, from:13.6, to:14.8, rail:true},
    {d:'v', pos:3.6,  from:-0.1, to:3.7},
    {d:'v', pos:3.6,  from:3.7,  to:4.4},
    {d:'h', pos:5.8,  from:-0.2, to:1.5},
    {d:'v', pos:1.5,  from:5.8,  to:7.8,  ops:[{t:'door', at:6.8, w:0.75}]},
    {d:'h', pos:7.7,  from:-0.2, to:3.6,  ops:[{t:'door', at:2.9, w:1.0}]},
    {d:'h', pos:3.7,  from:3.6,  to:8.4,  ops:[{t:'door', at:7.45, w:0.75}]},
    {d:'v', pos:8.3,  from:-0.1, to:7.7,  ops:[{t:'door', at:2.9, w:0.9}]},
    {d:'h', pos:2.2,  from:8.2,  to:10.0, ops:[{t:'door', at:9.1, w:0.8}]},
    {d:'v', pos:10.0, from:0.5,  to:7.8,  ops:[{t:'door', at:3.4, w:0.9},{t:'door', at:5.2, w:0.9}]},
    {d:'h', pos:3.9,  from:10.0, to:13.7},
    {d:'v', pos:3.6,  from:4.4,  to:7.8,  ops:[{t:'arch', at:6.0, w:1.5}]},
    {d:'h', pos:7.7,  from:3.6,  to:8.4,  ops:[{t:'arch', at:5.2, w:1.6}]},
    {d:'v', pos:6.6,  from:3.7,  to:7.7},
    {d:'h', pos:6.1,  from:6.6,  to:8.4},
    {d:'v', pos:1.2,  from:9.0,  to:13.4},
    {d:'h', pos:11.1, from:1.2,  to:3.5},
    {d:'v', pos:3.5,  from:9.0,  to:13.4}
  ],
  lights: [
    {x:5.0,  z:11.0, t:'disc'}, {x:10.6, z:11.0, t:'disc'}, {x:5.1, z:5.7, t:'disc'},
    {x:5.95, z:1.8,  t:'disc'}, {x:11.8, z:1.9,  t:'disc'}, {x:11.8, z:5.8, t:'disc'},
    {x:1.75, z:2.8,  t:'disc'}, {x:2.35, z:10.05,t:'disc'}, {x:1.8, z:8.3, t:'disc'},
    {x:9.15, z:4.9,  t:'disc'}, {x:0.55, z:11.0, t:'disc'}
  ]
};
const OP_DEFAULTS = { door:{w:0.9, h:2.05}, win:{w:1.2, h:1.2, sill:0.9}, arch:{w:1.5, h:2.3} };
const WALL_T = 0.2, WALL_H = 2.6, SNAP = 0.05;
const LS_KEY = 'walleditor.draft';

/* ============ line icons (same stroke style as the app) ============ */
const ICONS = {
  cursor:'<path d="M4 3l6.5 16 2.3-6.7L19.5 10 4 3Z"/>',
  map:'<path d="M9 4 3 6.5v14L9 18l6 2.5 6-2.5v-14L15 6 9 4Z"/><path d="M9 4v14M15 6v14.5"/>',
  split:'<rect x="3" y="4.5" width="18" height="15" rx="2"/><path d="M12 4.5v15" stroke-dasharray="2 2.4"/>',
  trash:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"/>',
  wall:'<rect x="3" y="5" width="18" height="14" rx="1.3"/><path d="M3 9.7h18M3 14.3h18"/><path d="M12 5v4.7M8 9.7v4.6M16 9.7v4.6M12 14.3V19"/>',
  door:'<path d="M5 21V4.5A1.5 1.5 0 0 1 6.5 3H15a1.5 1.5 0 0 1 1.5 1.5V21"/><path d="M3.5 21h15"/><path d="M13 12h.01"/>',
  window:'<rect x="4" y="4" width="16" height="16" rx="1.3"/><path d="M4 12h16M12 4v16"/>',
  arch:'<path d="M4 21V11a8 8 0 0 1 16 0v10"/><path d="M2.5 21h19"/>',
  bulb:'<path d="M9 18h6"/><path d="M10 21h4"/><path d="M15.1 14.5A5.5 5.5 0 1 0 8.9 14.5c.7.7 1.1 1.4 1.1 2.3v.2h4v-.2c0-.9.4-1.6 1.1-2.3Z"/>',
  back:'<path d="M19 12H5M12 19l-7-7 7-7"/>',
  undo:'<path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/>',
  cube:'<path d="M21 8.5v7a2 2 0 0 1-1 1.7l-7 4a2 2 0 0 1-2 0l-7-4A2 2 0 0 1 3 15.5v-7a2 2 0 0 1 1-1.7l7-4a2 2 0 0 1 2 0l7 4A2 2 0 0 1 21 8.5Z"/><path d="m3.3 7.5 8.7 5 8.7-5M12 22.5v-10"/>',
  reset:'<path d="M3 12a9 9 0 1 0 2.6-6.3L3 8M3 3v5h5"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>'
};
const svgIcon = n => `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[n] || ''}</svg>`;
document.querySelectorAll('[data-ic]').forEach(b => b.insertAdjacentHTML('afterbegin', svgIcon(b.dataset.ic)));

/* ============ state ============ */
const READONLY = new URLSearchParams(location.search).has('ro');   // guest view-only: no editing, only 3D preview / Back / Rooms
if (READONLY) document.body.classList.add('ro');
let plan = READONLY ? fresh() : (load() || fresh());   // guests always view the real current home, never a saved draft
let roomsD = [];                                     // detected rooms [{name, rects, cx, cz, area}]
let names = plan.names || {};                        // room name memory keyed by rounded centroid
let tool = 'select', selW = -1, selOp = -1, selLight = -1;
let cam = {x:6.8, z:6.5, s:64};                      // world centre + px per metre
const undoStack = [];
const EMBED = new URLSearchParams(location.search).has('embed');   // opened inside the app: Save applies, Back just closes
function basePlan(){ try{ const b = JSON.parse(localStorage.getItem('walleditor.baseplan')); if (b && Array.isArray(b.walls)) return b; }catch(e){} return null; }
function fresh(){
  const b = basePlan();                              // the app hands over the CURRENT live home (walls, dividers, lights, names)
  if (b) return { walls: JSON.parse(JSON.stringify(b.walls)).concat((b.zones || []).map(z => ({...z, zone:true}))),
                  lights: JSON.parse(JSON.stringify(b.lights || [])), names: {...(b.names || {})}, baseTs: b.ts };
  return JSON.parse(JSON.stringify(APARTMENT));
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    if (!d) return null;
    const b = basePlan();
    if (b && d.baseTs !== b.ts) return null;         // the live home changed since this draft — start from the fresh base
    return d;
  }catch(e){ return null; }
}
function save(){ if (READONLY) return; plan.names = names; try{ localStorage.setItem(LS_KEY, JSON.stringify(plan)); }catch(e){} }
function snap(v){ return Math.round(v / SNAP) * SNAP; }
function pushUndo(){ undoStack.push(JSON.stringify(plan)); if (undoStack.length > 60) undoStack.shift(); }
function undo(){ if (!undoStack.length) return; plan = JSON.parse(undoStack.pop()); selW = selOp = selLight = -1; detect(); save(); draw(); inspect(); }

/* ============ canvas & camera ============ */
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
function resize(){ cv.width = innerWidth * devicePixelRatio; cv.height = innerHeight * devicePixelRatio; cv.style.width = innerWidth + 'px'; cv.style.height = innerHeight + 'px'; draw(); }
addEventListener('resize', resize);
const sx = wx => (wx - cam.x) * cam.s + innerWidth / 2;
const sz = wz => (wz - cam.z) * cam.s + innerHeight / 2;
const wx = px => (px - innerWidth / 2) / cam.s + cam.x;
const wz = py => (py - innerHeight / 2) / cam.s + cam.z;

/* ============ room detection: flood fill + rect merge ============ */
function detect(){
  const W = plan.walls;
  if (!W.length){ roomsD = []; renderRooms(); return; }
  let x1 = 1e9, z1 = 1e9, x2 = -1e9, z2 = -1e9;
  for (const w of W){
    if (w.d === 'h'){ x1 = Math.min(x1, w.from); x2 = Math.max(x2, w.to); z1 = Math.min(z1, w.pos); z2 = Math.max(z2, w.pos); }
    else { z1 = Math.min(z1, w.from); z2 = Math.max(z2, w.to); x1 = Math.min(x1, w.pos); x2 = Math.max(x2, w.pos); }
  }
  x1 -= 0.5; z1 -= 0.5; x2 += 0.5; z2 += 0.5;
  const res = 0.05, gw = Math.ceil((x2 - x1) / res), gh = Math.ceil((z2 - z1) / res);
  if (gw * gh > 4e6){ roomsD = []; renderRooms(); return; }
  const blocked = new Uint8Array(gw * gh);
  for (const w of W){
    const t = w.zone ? 0.03 : WALL_T / 2;            // a divider splits the label with the thinnest possible line
    const a = w.d === 'h' ? {x1:w.from, x2:w.to, z1:w.pos - t, z2:w.pos + t} : {x1:w.pos - t, x2:w.pos + t, z1:w.from, z2:w.to};
    const ix1 = Math.max(0, Math.floor((a.x1 - x1) / res)), ix2 = Math.min(gw - 1, Math.ceil((a.x2 - x1) / res));
    const iz1 = Math.max(0, Math.floor((a.z1 - z1) / res)), iz2 = Math.min(gh - 1, Math.ceil((a.z2 - z1) / res));
    for (let iz = iz1; iz <= iz2; iz++) for (let ix = ix1; ix <= ix2; ix++) blocked[iz * gw + ix] = 1;
  }
  const seen = new Uint8Array(gw * gh);
  const bfs = (start, mark) => {                     // iterative flood
    const q = [start]; seen[start] = mark;
    const cells = [];
    while (q.length){
      const i = q.pop(); cells.push(i);
      const ix = i % gw, iz = (i / gw) | 0;
      for (const [dx, dz] of [[1,0],[-1,0],[0,1],[0,-1]]){
        const nx = ix + dx, nz = iz + dz;
        if (nx < 0 || nz < 0 || nx >= gw || nz >= gh) continue;
        const j = nz * gw + nx;
        if (!seen[j] && !blocked[j]){ seen[j] = mark; q.push(j); }
      }
    }
    return cells;
  };
  for (let ix = 0; ix < gw; ix++){ if (!blocked[ix] && !seen[ix]) bfs(ix, 1); const b = (gh - 1) * gw + ix; if (!blocked[b] && !seen[b]) bfs(b, 1); }
  for (let iz = 0; iz < gh; iz++){ const l = iz * gw; if (!blocked[l] && !seen[l]) bfs(l, 1); const r = iz * gw + gw - 1; if (!blocked[r] && !seen[r]) bfs(r, 1); }
  const pockets = [];
  for (let i = 0; i < gw * gh; i++){
    if (!blocked[i] && !seen[i]){
      const cells = bfs(i, 2);
      if (cells.length * res * res >= 0.8) pockets.push(cells);
    }
  }
  const prev = roomsD;
  roomsD = pockets.map(cells => {
    const mask = new Set(cells);
    let cx = 0, cz = 0;
    for (const i of cells){ cx += (i % gw); cz += ((i / gw) | 0); }
    cx = x1 + (cx / cells.length) * res; cz = z1 + (cz / cells.length) * res;
    // row-run merge into rects
    const runsByRow = new Map();
    for (const i of cells){
      const iz = (i / gw) | 0, ix = i % gw;
      if (!runsByRow.has(iz)) runsByRow.set(iz, []);
      runsByRow.get(iz).push(ix);
    }
    const rowRuns = new Map();
    for (const [iz, list] of runsByRow){
      list.sort((a, b) => a - b);
      const runs = [];
      let s = list[0], p = list[0];
      for (let k = 1; k <= list.length; k++){
        if (k === list.length || list[k] !== p + 1){ runs.push([s, p]); s = list[k]; }
        p = list[k];
      }
      rowRuns.set(iz, runs);
    }
    const rects = [];
    const rows = [...rowRuns.keys()].sort((a, b) => a - b);
    const open = new Map();                          // "x1,x2" -> {startRow}
    for (let r = 0; r <= rows.length; r++){
      const iz = rows[r], runs = r < rows.length && rows[r] === (r === 0 ? rows[0] : rows[r - 1] + 1) || r === 0 ? rowRuns.get(iz) : null;
      const cur = new Set();
      if (runs && (r === 0 || rows[r] === rows[r - 1] + 1)){
        for (const [a, b] of runs){
          const key = a + ',' + b;
          cur.add(key);
          if (!open.has(key)) open.set(key, rows[r]);
        }
      }
      for (const [key, startRow] of [...open]){
        if (!cur.has(key)){
          const [a, b] = key.split(',').map(Number);
          const endRow = r < rows.length && rows[r] === (r === 0 ? rows[0] : rows[r-1] + 1) ? rows[r] - 1 : rows[r - 1];
          rects.push([x1 + a * res, z1 + startRow * res, x1 + (b + 1) * res, z1 + (endRow + 1) * res]);
          open.delete(key);
        }
      }
    }
    const area = cells.length * res * res;
    // does anything open INTO this space? doors/arches/glass doors count — and so does a room
    // DIVIDER (an open-plan zone is walked into freely). No way in at all = a sealed void.
    let access = false;
    const probe = (w2, at) => {
      for (const off of [0.25, -0.25, 0.4, -0.4]){
        const px = w2.d === 'h' ? at : w2.pos + off;
        const pz = w2.d === 'h' ? w2.pos + off : at;
        const ix = Math.floor((px - x1) / res), izq = Math.floor((pz - z1) / res);
        if (ix >= 0 && izq >= 0 && ix < gw && izq < gh && mask.has(izq * gw + ix)) return true;
      }
      return false;
    };
    for (const w2 of W){
      if (w2.zone){
        for (const f of [0.25, 0.5, 0.75]){ if (probe(w2, w2.from + (w2.to - w2.from) * f)){ access = true; break; } }
      } else {
        for (const o of (w2.ops || [])){
          if (o.t === 'win') continue;
          if (probe(w2, o.t === 'glasswall' ? (w2.from + w2.to) / 2 : o.at)){ access = true; break; }
        }
      }
      if (access) break;
    }
    return { rects, cx, cz, area, access, key: Math.round(cx * 2) / 2 + '|' + Math.round(cz * 2) / 2 };
  });
  // keep names; hidden = sealed voids (no way in) or manually dismissed; real new rooms get a name + a centre light
  plan.ignored = plan.ignored || [];
  const bp = basePlan();                             // the app's live room names, matched by NEARNESS (centroids differ slightly)
  const baseNames = bp && bp.names ? Object.entries(bp.names).map(([k, name]) => { const [cx, cz] = k.split('|').map(Number); return { cx, cz, name }; }) : [];
  const usedBase = new Set();                        // names CLAIMED this run — a name can only dress one room
  for (const r of roomsD){
    r.hidden = !r.access || plan.ignored.includes(r.key);
    const old = prev.find(p => !p.hidden && Math.hypot(p.cx - r.cx, p.cz - r.cz) < 1.2);   // placeholder names of hidden spaces don't carry over
    r.name = names[r.key] || (old && old.name) || null;
    if (r.name) usedBase.add(r.name);
    if (r.hidden){ if (!r.name) r.name = r.access ? 'Hidden' : 'Sealed space'; continue; }
    if (!r.name){
      let bn = baseNames.filter(t => !usedBase.has(t.name))
        .sort((a, b) => Math.hypot(a.cx - r.cx, a.cz - r.cz) - Math.hypot(b.cx - r.cx, b.cz - r.cz))[0];
      if (!(bn && Math.hypot(bn.cx - r.cx, bn.cz - r.cz) < 1.6)){
        bn = baseNames.filter(t => !usedBase.has(t.name) && inRoom(r, t.cx, t.cz))   // open-plan pocket spanning several app rooms: take the one it contains
          .sort((a, b) => Math.hypot(a.cx - r.cx, a.cz - r.cz) - Math.hypot(b.cx - r.cx, b.cz - r.cz))[0];
      }
      if (bn && (Math.hypot(bn.cx - r.cx, bn.cz - r.cz) < 1.6 || inRoom(r, bn.cx, bn.cz))){
        r.name = bn.name; usedBase.add(bn.name);     // this is the app's room — keep its real name
        names[r.key] = r.name;
      } else {
        r.name = 'Room ' + (Object.keys(names).length + 1);
        names[r.key] = r.name;
        if (!plan.lights.some(L => Math.hypot(L.x - r.cx, L.z - r.cz) < 2.2 && inRoom(r, L.x, L.z))){
          plan.lights.push({ x: snap(r.cx), z: snap(r.cz), t: 'disc' });   // sensible default; change type after placing via the inspector
        }
      }
    } else names[r.key] = r.name;
  }
  renderRooms();
}
function inRoom(r, x, z){ return r.rects.some(([a, b, c, d]) => x >= a && x <= c && z >= b && z <= d); }
/* a small rename box right where the ✎ was tapped — the phone keyboard pops immediately */
function openRename(key, px, py){
  const r = roomsD.find(t => t.key === key);
  if (!r) return;
  const old = document.getElementById('rnFloat'); if (old) old.remove();
  const box = document.createElement('input');
  box.id = 'rnFloat'; box.value = r.name; box.maxLength = 24;
  box.style.cssText = `position:fixed;left:${Math.min(innerWidth - 165, Math.max(8, px - 75))}px;top:${Math.max(64, py - 20)}px;z-index:30;width:150px;background:var(--panel2);border:2px solid var(--accent);border-radius:10px;color:var(--text);padding:8px 10px;font-size:15px;outline:none;box-shadow:0 10px 30px rgba(0,0,0,.5)`;
  document.body.appendChild(box);
  box.focus(); box.select();
  let done = false;
  const finish = ok => {
    if (done) return; done = true;
    if (ok){ const n = box.value.trim(); if (n){ names[r.key] = r.name = n; save(); } }
    box.remove(); renderRooms(); draw();
  };
  box.addEventListener('keydown', ev => { ev.stopPropagation(); if (ev.key === 'Enter') finish(true); if (ev.key === 'Escape') finish(false); });
  box.addEventListener('pointerdown', ev => ev.stopPropagation());
  setTimeout(() => {                                 // arm the click-away AFTER the opening tap has fully settled,
    box.focus(); box.select();                       // or the same tap's pointerup blurs the box instantly on phones
    box.addEventListener('blur', () => finish(true));
  }, 200);
}

function setRoomsOpen(on){                            // the top-bar Rooms button shows / hides the whole panel
  document.getElementById('rooms').classList.toggle('open', on);
  document.getElementById('roomsBtn').classList.toggle('on', on);
}
function renderRooms(){
  const el = document.getElementById('rooms');
  const vis = roomsD.filter(r => !r.hidden);
  const sealed = roomsD.filter(r => r.hidden && !r.access);
  const dismissed = roomsD.filter(r => r.hidden && r.access);
  el.innerHTML = `<h3 style="display:flex;align-items:center;gap:6px">
      <span style="flex:1">Rooms (${vis.length}) <span class="sub">· shaped by their walls</span></span>
      <button class="ric" id="roomsClose" title="Close">${svgIcon('x')}</button></h3>` +
    vis.map(r => `<div class="rr" data-k="${r.key}">
      <span class="rn">${r.name}</span><span class="ra">${r.area.toFixed(1)} m²</span>
      ${READONLY ? '' : `<button class="ric" data-edit="${r.key}" title="Rename">${svgIcon('edit')}</button>
      <button class="ric" data-hide="${r.key}" title="This isn't a room">${svgIcon('x')}</button>`}</div>`).join('') +
    (vis.length ? '' : '<div class="sub" style="padding:4px 0">no rooms yet — close a shape with walls</div>') +
    (sealed.length ? `<div class="sub" style="margin-top:7px">${sealed.length} sealed space${sealed.length > 1 ? 's' : ''} hidden (no door in) — add a door or arch to make one a room</div>` : '') +
    dismissed.map(r => `<div class="rr off"><span class="rn">${r.name}</span><span class="ra">${r.area.toFixed(1)} m²</span>
      ${READONLY ? '' : `<button class="ric" data-restore="${r.key}" title="Restore">${svgIcon('reset')}</button>`}</div>`).join('');
  el.querySelector('#roomsClose').onclick = () => setRoomsOpen(false);
  el.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
    const rect = b.getBoundingClientRect();
    openRename(b.dataset.edit, rect.left, rect.top - 8);
  });
  el.querySelectorAll('[data-hide]').forEach(b => b.onclick = () => {
    plan.ignored = plan.ignored || [];
    plan.ignored.push(b.dataset.hide);
    detect(); save(); draw();
  });
  el.querySelectorAll('[data-restore]').forEach(b => b.onclick = () => {
    plan.ignored = (plan.ignored || []).filter(k => k !== b.dataset.restore);
    detect(); save(); draw();
  });
}

/* ============ drawing ============ */
const ROOM_TINTS = ['#4c86d622','#e8709a22','#5bd6a022','#e0a33e22','#a06aff22','#6ad0e022','#d6cf4c22','#e0653e22'];
function draw(){
  const dpr = devicePixelRatio;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  // grid
  const step = cam.s > 90 ? 0.1 : 0.5;
  ctx.strokeStyle = '#1b2330'; ctx.lineWidth = 1;
  const gx1 = Math.floor(wx(0) / step) * step, gx2 = wx(innerWidth), gz1 = Math.floor(wz(0) / step) * step, gz2 = wz(innerHeight);
  ctx.beginPath();
  for (let x = gx1; x < gx2; x += step){ ctx.moveTo(sx(x), 0); ctx.lineTo(sx(x), innerHeight); }
  for (let z = gz1; z < gz2; z += step){ ctx.moveTo(0, sz(z)); ctx.lineTo(innerWidth, sz(z)); }
  ctx.stroke();
  // rooms (hidden/sealed spaces stay blank on the plan)
  penHits.length = 0;
  roomsD.forEach((r, i) => {
    if (r.hidden) return;
    ctx.fillStyle = ROOM_TINTS[i % ROOM_TINTS.length];
    for (const [a, b, c, d] of r.rects) ctx.fillRect(sx(a), sz(b), (c - a) * cam.s, (d - b) * cam.s);
    const fs = Math.max(11, Math.min(30, cam.s * 0.24));   // room labels zoom WITH the plan
    ctx.fillStyle = '#e8edf3'; ctx.font = `600 ${fs}px system-ui`; ctx.textAlign = 'center';
    ctx.fillText(r.name, sx(r.cx), sz(r.cz) - fs * 0.3);
    ctx.fillStyle = '#8b97a5'; ctx.font = `${Math.max(9, fs * 0.78)}px system-ui`;
    ctx.fillText(r.area.toFixed(1) + ' m²', sx(r.cx), sz(r.cz) + fs * 0.85);
    if (!READONLY){                                  // guests can't rename — no ✎
      ctx.font = `600 ${fs}px system-ui`;            // measure the NAME with its own font, not the area's
      const pw = ctx.measureText(r.name).width;      // little pen right after the name — tap it to rename
      const px = sx(r.cx) + pw / 2 + fs * 0.9, py = sz(r.cz) - fs * 0.45;
      ctx.fillStyle = 'rgba(139,151,165,.95)'; ctx.font = `${fs * 0.95}px system-ui`;
      ctx.fillText('✎', px, py + fs * 0.35);
      penHits.push({ x: px, y: py + fs * 0.1, key: r.key });
    }
  });
  // walls
  plan.walls.forEach((w, i) => {
    const seld = i === selW;
    const t = (WALL_T / 2) * cam.s;
    if (w.zone){                                     // room divider: dashed, thin, clearly not a wall
      ctx.strokeStyle = seld ? '#ffd23e' : '#7fa8d8';
      ctx.lineWidth = 2; ctx.setLineDash([9, 7]);
      ctx.beginPath();
      if (w.d === 'h'){ ctx.moveTo(sx(w.from), sz(w.pos)); ctx.lineTo(sx(w.to), sz(w.pos)); }
      else { ctx.moveTo(sx(w.pos), sz(w.from)); ctx.lineTo(sx(w.pos), sz(w.to)); }
      ctx.stroke(); ctx.setLineDash([]);
    } else {
    const col = w.rail ? '#5b8ba6' : w.ops && w.ops[0] && w.ops[0].t === 'glasswall' ? '#69b7e0' : seld ? '#ffd23e' : '#9db1c5';
    ctx.globalAlpha = (w.h && w.h < 2.2) ? 0.6 : 1;   // half-walls read lighter on the plan
    ctx.fillStyle = col;
    const segs = solidSegs(w);
    for (const [a, b] of segs){
      if (w.d === 'h') ctx.fillRect(sx(a), sz(w.pos) - t, (b - a) * cam.s, t * 2);
      else ctx.fillRect(sx(w.pos) - t, sz(a), t * 2, (b - a) * cam.s);
    }
    ctx.globalAlpha = 1;
    }
    // ops glyphs
    (w.ops || []).forEach((o, oi) => {
      if (o.t === 'glasswall') return;
      const osel = seld && oi === selOp;
      ctx.strokeStyle = osel ? '#ffd23e' : o.t === 'door' ? '#7fd08f' : o.t === 'win' ? '#69b7e0' : '#c9a86a';
      ctx.lineWidth = osel ? 3 : 2;
      const a = o.at - o.w / 2, b = o.at + o.w / 2;
      ctx.beginPath();
      if (w.d === 'h'){
        ctx.moveTo(sx(a), sz(w.pos)); ctx.lineTo(sx(b), sz(w.pos));
        if (o.t === 'win'){ ctx.moveTo(sx(a), sz(w.pos) - 3); ctx.lineTo(sx(b), sz(w.pos) - 3); }
      } else {
        ctx.moveTo(sx(w.pos), sz(a)); ctx.lineTo(sx(w.pos), sz(b));
        if (o.t === 'win'){ ctx.moveTo(sx(w.pos) - 3, sz(a)); ctx.lineTo(sx(w.pos) - 3, sz(b)); }
      }
      if (o.t === 'door'){                           // swing arc honours hinge side + opening direction
        const hg = o.hinge || 1, sw = o.swing || 1;
        const hAt = o.at - hg * o.w / 2;             // hinge jamb
        const hx = w.d === 'h' ? sx(hAt) : sx(w.pos);
        const hz = w.d === 'h' ? sz(w.pos) : sz(hAt);
        const alongAng = w.d === 'h' ? (hg > 0 ? 0 : Math.PI) : (hg > 0 ? Math.PI / 2 : -Math.PI / 2);
        ctx.moveTo(hx, hz);
        ctx.arc(hx, hz, o.w * cam.s, alongAng, alongAng + sw * Math.PI / 2, sw < 0);
        ctx.lineTo(hx, hz);                          // the door leaf, standing open
      }
      ctx.stroke();
      if (osel){
        ctx.fillStyle = '#ffd23e'; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
        const mx = w.d === 'h' ? sx(o.at) : sx(w.pos), mz = w.d === 'h' ? sz(w.pos) : sz(o.at);
        ctx.fillText(o.w.toFixed(2) + ' m', mx, mz - 10);
      }
    });
    // measurement label
    const len = w.to - w.from;
    ctx.fillStyle = seld ? '#ffd23e' : '#67788c';
    ctx.font = (seld ? '600 ' : '') + '11px system-ui'; ctx.textAlign = 'center';
    if (w.d === 'h') ctx.fillText(len.toFixed(2) + ' m', sx((w.from + w.to) / 2), sz(w.pos) - t - 4);
    else { ctx.save(); ctx.translate(sx(w.pos) - t - 5, sz((w.from + w.to) / 2)); ctx.rotate(-Math.PI / 2); ctx.fillText(len.toFixed(2) + ' m', 0, 0); ctx.restore(); }
    // (endpoint handles are drawn AFTER every wall/light below, so nothing can hide them)
  });
  // lights
  plan.lights.forEach((L, i) => {
    const p = { x: sx(L.x), z: sz(L.z) }, on = i === selLight;
    ctx.strokeStyle = on ? '#ffd23e' : '#e5c687'; ctx.fillStyle = on ? '#ffd23e' : '#e5c68766'; ctx.lineWidth = 2;
    ctx.beginPath();
    if (L.t === 'ring'){ ctx.arc(p.x, p.z, 8, 0, Math.PI * 2); ctx.stroke(); }
    else if (L.t === 'bar'){ ctx.fillRect(p.x - 11, p.z - 3.5, 22, 7); ctx.strokeRect(p.x - 11, p.z - 3.5, 22, 7); }
    else if (L.t === 'pendant'){ ctx.arc(p.x, p.z, 5, 0, Math.PI * 2); ctx.fill(); ctx.moveTo(p.x, p.z - 5); ctx.lineTo(p.x, p.z - 12); ctx.stroke(); }
    else if (L.t === 'dome'){ ctx.arc(p.x, p.z, 8, Math.PI, 0); ctx.fill(); ctx.stroke(); }
    else { ctx.arc(p.x, p.z, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); }
  });
  // endpoint handles for the selected wall — drawn LAST, on top of every wall & opening, so they can
  // never end up hidden under a crossing wall. A dark ring makes them pop on any wall colour.
  if (selW >= 0 && plan.walls[selW]){
    const w = plan.walls[selW];
    for (const e of [w.from, w.to]){
      const px = w.d === 'h' ? sx(e) : sx(w.pos), pz = w.d === 'h' ? sz(w.pos) : sz(e);
      ctx.beginPath(); ctx.arc(px, pz, 7, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd23e'; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = '#0d1117'; ctx.stroke();
    }
  }
  // live wall preview while drawing
  if (drawing){
    ctx.strokeStyle = '#ffd23e'; ctx.lineWidth = 3; ctx.setLineDash([6, 5]);
    ctx.beginPath(); ctx.moveTo(sx(drawing.x1), sz(drawing.z1)); ctx.lineTo(sx(drawing.x2), sz(drawing.z2)); ctx.stroke();
    ctx.setLineDash([]);
    const len = Math.max(Math.abs(drawing.x2 - drawing.x1), Math.abs(drawing.z2 - drawing.z1));
    ctx.fillStyle = '#ffd23e'; ctx.font = '600 13px system-ui';
    ctx.fillText(len.toFixed(2) + ' m', sx((drawing.x1 + drawing.x2) / 2) + 10, sz((drawing.z1 + drawing.z2) / 2) - 10);
  }
}
function solidSegs(w){                               // wall spans minus its openings (the 2D version of the mesh cut)
  const ops = (w.ops || []).filter(o => o.t !== 'glasswall').slice().sort((a, b) => a.at - b.at);
  const segs = []; let cur = w.from;
  for (const o of ops){
    const a = o.at - o.w / 2, b = o.at + o.w / 2;
    if (a > cur + 0.01) segs.push([cur, a]);
    cur = Math.max(cur, b);
  }
  if (cur < w.to - 0.01) segs.push([cur, w.to]);
  return segs.length ? segs : [[w.from, w.to]];
}

/* ============ hit testing ============ */
// hit tolerances are pixel-based (…/cam.s = pixels → world metres) so the targets stay finger-sized at any zoom
function hitWall(x, z){
  const pad = Math.max(0.1, 12 / cam.s);
  let best = -1, bd = Math.max(0.2, 15 / cam.s);
  plan.walls.forEach((w, i) => {
    const d = w.d === 'h'
      ? (x >= w.from - pad && x <= w.to + pad ? Math.abs(z - w.pos) : 1e9)
      : (z >= w.from - pad && z <= w.to + pad ? Math.abs(x - w.pos) : 1e9);
    if (d < bd){ bd = d; best = i; }
  });
  return best;
}
// find the door/window/arch under the finger on ANY wall (not just the selected one) with a generous target,
// so one tap grabs it. Returns {wi, oi} or null.
function hitOpAny(x, z){
  const pad = Math.max(0.18, 22 / cam.s);            // slack along the wall
  let best = null, bestPerp = Math.max(0.32, 26 / cam.s);   // slack across the wall
  plan.walls.forEach((w, wi) => {
    const along = w.d === 'h' ? x : z, perp = w.d === 'h' ? Math.abs(z - w.pos) : Math.abs(x - w.pos);
    if (perp > bestPerp) return;
    (w.ops || []).forEach((o, i) => {
      if (o.t === 'glasswall') return;
      if (Math.abs(along - o.at) <= o.w / 2 + pad){ bestPerp = perp; best = { wi, oi: i }; }
    });
  });
  return best;
}
function hitLight(x, z){
  let best = -1, bd = Math.max(0.3, 26 / cam.s);
  plan.lights.forEach((L, i) => { const d = Math.hypot(L.x - x, L.z - z); if (d < bd){ bd = d; best = i; } });
  return best;
}
function hitEndpoint(x, z){
  if (selW < 0) return 0;
  const w = plan.walls[selW];
  for (const [which, e] of [[-1, w.from], [1, w.to]]){
    const px = w.d === 'h' ? e : w.pos, pz = w.d === 'h' ? w.pos : e;
    if (Math.hypot(x - px, z - pz) < 18 / cam.s) return which;
  }
  return 0;
}

/* ============ pointer interaction ============ */
let drawing = null, dragMode = null, panLast = null, detectT = null, pendSel = null;   // pendSel: a press that will SELECT on release unless it turns into a pan
const penHits = [];                                  // screen positions of the ✎ glyphs, rebuilt every draw
const ptrs = new Map(); let pinch = null;            // two fingers = pinch zoom + pan (phones)
function scheduleDetect(){ clearTimeout(detectT); detectT = setTimeout(() => { detect(); save(); draw(); }, 300); }
cv.addEventListener('pointerdown', e => {
  try { cv.setPointerCapture(e.pointerId); } catch(_){}
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (ptrs.size === 2){                              // second finger: whatever was happening becomes a pinch
    drawing = null; dragMode = null; panLast = null; pendSel = null;
    const [a, b] = [...ptrs.values()];
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    pinch = { d: Math.max(20, Math.hypot(a.x - b.x, a.y - b.y)), s: cam.s, wx: wx(mx), wz: wz(my) };

  if (tool === 'door' || tool === 'win' || tool === 'arch'){
    const wi = hitWall(x, z);
    if (wi >= 0){
      pushUndo();
      const w = plan.walls[wi];
      if (w.rail || w.zone || (w.ops || []).some(o => o.t === 'glasswall')) return;   // dividers hold no openings — they're already open
      const d = OP_DEFAULTS[tool];
      const at = snap(Math.min(w.to - d.w / 2, Math.max(w.from + d.w / 2, w.d === 'h' ? x : z)));
      w.ops = w.ops || [];
      w.ops.push({ t: tool, at, ...JSON.parse(JSON.stringify(d)) });

      inspect(); scheduleDetect(); draw();
    }

  }
  if (tool === 'light'){
    pushUndo();

    return;
  }
  if (tool === 'del'){
    const li = hitLight(x, z);

    const wi = hitWall(x, z);
    if (wi >= 0){
      pushUndo();
      const w = plan.walls[wi];
      const oi = (() => { const along = w.d === 'h' ? x : z; let b = -1; (w.ops || []).forEach((o, i) => { if (o.t !== 'glasswall' && Math.abs(along - o.at) <= o.w / 2 + 0.08) b = i; }); return b; })();

  }

  // pointerup). You can only EDIT by dragging something that is ALREADY selected, so aiming to pan
  // never gets hijacked into moving a wall / opening / light you only meant to slide the view past.
  const pen = penHits.find(p => Math.hypot(e.clientX - p.x, e.clientY - p.y) < Math.max(20, cam.s * 0.3));

  const ep = hitEndpoint(x, z);
  if (ep){ pushUndo(); dragMode = { kind: 'end', which: ep }; return; }        // hitEndpoint only fires for the selected wall
  const opHit = hitOpAny(x, z);                                                 // door / window / arch on ANY wall
  if (opHit && opHit.wi === selW && opHit.oi === selOp){ pushUndo(); dragMode = { kind: 'op' }; return; }   // drag an already-selected opening
  const li = hitLight(x, z);
  if (li >= 0 && li === selLight){ pushUndo(); dragMode = { kind: 'light' }; return; }   // drag an already-selected light
  const wi = hitWall(x, z);
  if (wi >= 0 && wi === selW && selOp < 0){ pushUndo(); dragMode = { kind: 'wall' }; return; }   // slide an already-selected wall
  // nothing already-selected is under the finger: remember what a tap would pick, but let a drag pan
  pendSel = { x: e.clientX, y: e.clientY, opHit, light: li, wall: wi };
});
cv.addEventListener('pointermove', e => {
  if (ptrs.has(e.pointerId)) ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pinch && ptrs.size === 2){                     // pinch: zoom about the fingers' midpoint
    const [a, b] = [...ptrs.values()];
    const d = Math.max(20, Math.hypot(a.x - b.x, a.y - b.y));
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    cam.s = Math.min(220, Math.max(18, pinch.s * d / pinch.d));
    cam.x = pinch.wx - (mx - innerWidth / 2) / cam.s;
    cam.z = pinch.wz - (my - innerHeight / 2) / cam.s;
    draw(); return;
  }
  // a pending tap that starts to move becomes a PAN — and so will NOT select on release
  if (pendSel && Math.abs(e.clientX - pendSel.x) + Math.abs(e.clientY - pendSel.y) >= 6){
    panLast = { x: e.clientX, y: e.clientY }; pendSel = null;
  }
  const x = wx(e.clientX), z = wz(e.clientY);
  if (drawing){
    const dx = Math.abs(x - drawing.x1), dz = Math.abs(z - drawing.z1);
    if (dx >= dz){ drawing.x2 = snap(x); drawing.z2 = drawing.z1; } else { drawing.z2 = snap(z); drawing.x2 = drawing.x1; }
    draw(); return;
  }
  if (panLast){ cam.x -= (e.clientX - panLast.x) / cam.s; cam.z -= (e.clientY - panLast.y) / cam.s; panLast = { x: e.clientX, y: e.clientY }; draw(); return; }

    const w = plan.walls[selW];
    if (w.d === 'h') w.pos = snap(z); else w.pos = snap(x);
    scheduleDetect(); draw(); inspect();
  } else if (dragMode.kind === 'end' && selW >= 0){
    const w = plan.walls[selW];
    const v = snap(w.d === 'h' ? x : z);
    if (dragMode.which < 0) w.from = Math.min(v, w.to - 0.3); else w.to = Math.max(v, w.from + 0.3);
    (w.ops || []).forEach(o => { o.at = Math.min(w.to - o.w / 2, Math.max(w.from + o.w / 2, o.at)); });
    scheduleDetect(); draw(); inspect();
  } else if (dragMode.kind === 'op' && selW >= 0 && selOp >= 0){
    const w = plan.walls[selW], o = w.ops[selOp];
    o.at = snap(Math.min(w.to - o.w / 2, Math.max(w.from + o.w / 2, w.d === 'h' ? x : z)));

const dropPtr = e => { ptrs.delete(e.pointerId); if (ptrs.size < 2) pinch = null; };
cv.addEventListener('pointercancel', dropPtr);
cv.addEventListener('pointerup', e => {
  dropPtr(e);
  if (pinch) return;                                 // still two fingers down
  if (drawing){
    const len = Math.max(Math.abs(drawing.x2 - drawing.x1), Math.abs(drawing.z2 - drawing.z1));
    if (len >= 0.3){
      const w = drawing.x2 !== drawing.x1
        ? { d: 'h', pos: drawing.z1, from: Math.min(drawing.x1, drawing.x2), to: Math.max(drawing.x1, drawing.x2) }
        : { d: 'v', pos: drawing.x1, from: Math.min(drawing.z1, drawing.z2), to: Math.max(drawing.z1, drawing.z2) };
      if (drawing.zone) w.zone = true;               // a room divider: splits the label, builds no wall
      plan.walls.push(w);
      selW = plan.walls.length - 1; selOp = -1;
      scheduleDetect();

    drawing = null; inspect(); draw(); return;
  }
  if (dragMode){ save(); }

    else if (pendSel.wall >= 0){ selW = pendSel.wall; selOp = -1; selLight = -1; }

  }

});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const px = wx(e.clientX), pz = wz(e.clientY);
  cam.s = Math.min(220, Math.max(18, cam.s * (e.deltaY > 0 ? 0.88 : 1.14)));
  cam.x = px - (e.clientX - innerWidth / 2) / cam.s;
  cam.z = pz - (e.clientY - innerHeight / 2) / cam.s;

addEventListener('keydown', e => {

  } else if (selW >= 0 && plan.walls[selW].zone){

    el.innerHTML = `<h3>Room divider</h3>
      <div class="big">${(w.to - w.from).toFixed(2)} m</div>

      <button id="wDel">Remove divider</button>`;
    el.querySelector('#wDel').onclick = () => { pushUndo(); plan.walls.splice(selW, 1); selW = -1; selOp = -1; inspect(); scheduleDetect(); draw(); };
  } else if (selW >= 0){

let three = null;
document.getElementById('view3d').onclick = async () => {
  document.getElementById('p3d').style.display = 'block';
  if (!three){
    const THREE = await import('https://unpkg.com/three@0.160.0/build/three.module.js');
    const r = new THREE.WebGLRenderer({ antialias: true });
    r.setSize(innerWidth, innerHeight); r.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.getElementById('p3d').appendChild(r.domElement);
    three = { THREE, r, scene: null, cam: new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200), az: 0.8, el: 0.9, dist: 16, ctr: new THREE.Vector3(6.8, 0, 6.5) };
    const c = r.domElement;
    let last = null;
    c.addEventListener('pointerdown', e => last = { x: e.clientX, y: e.clientY });
    c.addEventListener('pointermove', e => {
      if (!last) return;
      three.az -= (e.clientX - last.x) * 0.005;
      three.el = Math.min(1.45, Math.max(0.15, three.el + (e.clientY - last.y) * 0.004));
      last = { x: e.clientX, y: e.clientY };
    });
    addEventListener('pointerup', () => last = null);
    c.addEventListener('wheel', e => { e.preventDefault(); three.dist = Math.min(40, Math.max(5, three.dist * (e.deltaY > 0 ? 1.1 : 0.9))); }, { passive: false });
    const loop = () => {
      requestAnimationFrame(loop);
      if (document.getElementById('p3d').style.display === 'none' || !three.scene) return;
      const { cam, az, el, dist, ctr } = three;
      cam.position.set(ctr.x + Math.sin(az) * Math.cos(el) * dist, Math.sin(el) * dist, ctr.z + Math.cos(az) * Math.cos(el) * dist);
      cam.lookAt(ctr);
      three.r.render(three.scene, cam);
    };
    loop();
  }

};
document.getElementById('close3d').onclick = () => document.getElementById('p3d').style.display = 'none';
function build3d(){
  const { THREE } = three;
  const sc = new THREE.Scene();
  sc.background = new THREE.Color('#10151c');
  sc.add(new THREE.HemisphereLight(0xffffff, 0x39434f, 0.85));
  const sun = new THREE.DirectionalLight(0xfff2dd, 0.9); sun.position.set(10, 14, 6); sc.add(sun);
  const wallMat = new THREE.MeshStandardMaterial({ color: '#aab5c2', roughness: 0.9 });
  const glassMat = new THREE.MeshStandardMaterial({ color: '#9fc9e8', transparent: true, opacity: 0.3, roughness: 0.15 });
  const floorMat = new THREE.MeshStandardMaterial({ color: '#cfc4ae', roughness: 0.95 });
  const box = (w, h, d, m) => new THREE.Mesh(new THREE.BoxGeometry(w, h, d), m);
  for (const r of roomsD) for (const [a, b, c2, d2] of r.rects){
    const f = box(c2 - a, 0.05, d2 - b, floorMat);
    f.position.set((a + c2) / 2, -0.025, (b + d2) / 2); sc.add(f);
  }
  for (const w of plan.walls){
    if (w.zone) continue;                            // dividers are labels, not geometry
    const grp = new THREE.Group();
    const H = w.h ?? WALL_H;                         // per-wall height (half-walls, counters, parapets)
    const L = w.to - w.from, cx0 = (w.from + w.to) / 2;
    if (w.d === 'h') grp.position.set(cx0, 0, w.pos); else { grp.position.set(w.pos, 0, cx0); grp.rotation.y = -Math.PI / 2; }
    const seg = (sw, sh, x, y, glass) => { const m = box(sw, sh, glass ? 0.04 : WALL_T, glass ? glassMat : wallMat); m.position.set(x, y, 0); grp.add(m); };
    if (w.rail){ seg(L, 1.0, 0, 0.5); sc.add(grp); continue; }
    if ((w.ops || [])[0] && w.ops[0].t === 'glasswall'){ seg(L, Math.min(2.25, H - 0.3), 0, 0.05 + Math.min(2.25, H - 0.3) / 2, true); if (H > 2.3) seg(L, H - 2.3, 0, 2.3 + (H - 2.3) / 2); sc.add(grp); continue; }
    const ops = (w.ops || []).slice().sort((a, b) => a.at - b.at);
    let cur = -L / 2;
    for (const o of ops){
      const u = o.at - cx0, half = o.w / 2;
      if (u - half - cur > 0.01) seg(u - half - cur, H, cur + (u - half - cur) / 2, H / 2);
      if (o.t === 'win'){
        const sill = Math.min(o.sill ?? 0.9, H - 0.1), wh = Math.min(o.h ?? 1.2, H - sill);
        if (sill > 0.02) seg(o.w, sill, u, sill / 2);
        if (sill + wh < H - 0.02) seg(o.w, H - sill - wh, u, sill + wh + (H - sill - wh) / 2);
        seg(o.w, wh, u, sill + wh / 2, true);
      } else {
        const oh = Math.min(o.h ?? (o.t === 'arch' ? 2.3 : 2.05), H);
        if (oh < H - 0.02) seg(o.w, H - oh, u, oh + (H - oh) / 2);
      }
      cur = u + half;
    }
    if (L / 2 - cur > 0.01) seg(L / 2 - cur, H, cur + (L / 2 - cur) / 2, H / 2);
    sc.add(grp);
  }
  const liteGeo = { disc: [0.19, 0.06], dome: [0.16, 0.12], ring: [0.24, 0.05], bar: [0.5, 0.07], pendant: [0.12, 0.3] };
  for (const Lg of plan.lights){
    const [rad, h] = liteGeo[Lg.t] || liteGeo.disc;
    const m = Lg.t === 'bar'
      ? box(rad, h, 0.12, new THREE.MeshStandardMaterial({ color: '#8a9099', emissive: 0xffd9a0, emissiveIntensity: 1.4 }))
      : new THREE.Mesh(new THREE.CylinderGeometry(rad, rad * (Lg.t === 'dome' ? 0.4 : 1), h, 18), new THREE.MeshStandardMaterial({ color: '#8a9099', emissive: 0xffd9a0, emissiveIntensity: 1.4 }));
    m.position.set(Lg.x, WALL_H - 0.1 - (Lg.t === 'pendant' ? 0.25 : 0), Lg.z);
    sc.add(m);
  }
  plan.lights.slice(0, 10).forEach(Lg => { const p = new THREE.PointLight(0xffd9a6, 2.2, 7, 1.8); p.position.set(Lg.x, WALL_H - 0.35, Lg.z); sc.add(p); });
  // centre the orbit on the plan
  let x1 = 1e9, z1 = 1e9, x2 = -1e9, z2 = -1e9;
  for (const w of plan.walls){
    if (w.d === 'h'){ x1 = Math.min(x1, w.from); x2 = Math.max(x2, w.to); z1 = Math.min(z1, w.pos); z2 = Math.max(z2, w.pos); }
    else { x1 = Math.min(x1, w.pos); x2 = Math.max(x2, w.pos); z1 = Math.min(z1, w.from); z2 = Math.max(z2, w.to); }
  }
  three.ctr.set((x1 + x2) / 2, 0, (z1 + z2) / 2);
  three.dist = Math.max(x2 - x1, z2 - z1) * 1.1;
  three.scene = sc;
}

/* ============ test hooks + boot ============ */
window.ED = {
  plan: () => plan, rooms: () => roomsD.map(r => ({ name: r.name, area: +r.area.toFixed(2), rects: r.rects.length })),
  addWall: w => { plan.walls.push(w); detect(); save(); draw(); return plan.walls.length - 1; },
  addOp: (wi, op) => { const w = plan.walls[wi]; w.ops = w.ops || []; w.ops.push(op); detect(); save(); draw(); return w.ops.length - 1; },
  lights: () => plan.lights, export: () => ({ walls: plan.walls, lights: plan.lights, rooms: roomsD.map(r => ({ name: r.name, rects: r.rects })) }),
  pens: () => penHits.slice(),
  sel: () => ({ selW, selOp, selLight }),
  cam: () => ({ x: cam.x, z: cam.z, s: cam.s }),
  screen: (wx, wz) => ({ x: sx(wx), y: sz(wz) }),
  reset: () => { plan = fresh(); names = {}; detect(); save(); draw(); }
};
if (READONLY) document.getElementById('hint').textContent = 'Viewing only · drag to pan · pinch to zoom · try 3D or Rooms';
resize();
detect();
draw();
</script>
